<!DOCTYPE html>
<html>
<head>
  <title>IDP Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }

    .green { color: green; font-weight: bold; }
    .yellow { color: orange; font-weight: bold; }
    .red { color: red; font-weight: bold; }

    .badge {
      padding: 2px 6px;
      margin-left: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: white;
    }

    .manual { background: #28a745; }
    .repo { background: #007bff; }

    #logsModal {
      display: none;
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 85%;
      background: black;
      color: lime;
      z-index: 1000;
      border-radius: 8px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>IDP Dashboard</h2>

<div id="controls">
  <select id="mode" onchange="toggleMode()">
    <option value="image">Image</option>
    <option value="repo">GitHub Repo</option>
  </select>

  <input id="name" placeholder="Service Name" />

  <div id="imageFields">
    <input id="image" placeholder="Image (nginx:latest)" />
  </div>

  <div id="repoFields" style="display:none;">
    <input id="repo" placeholder="GitHub Repo URL" />
  </div>

  <input id="env" placeholder="ENV (KEY=VALUE)" />
  <input id="replicas" type="number" value="1" min="1" max="5" />

  <select id="type">
    <option value="web">web</option>
    <option value="api">api</option>
    <option value="worker">worker</option>
  </select>

  <button onclick="deployUnified()">Deploy</button>
  <button onclick="loadServices()">Refresh</button>
</div>

<table>
  <thead>
    <tr>
      <th>Service</th>
      <th>Status</th>
      <th>Replicas</th>
      <th>CPU</th>
      <th>Memory</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- FIXED MODAL -->
<div id="logsModal">

  <!-- FIXED HEADER -->
  <div style="
    position: sticky;
    top: 0;
    background: black;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
    z-index: 10;
  ">
    <strong>Logs</strong>
    <div>
      <button onclick="closeLogs()">Stop</button>
      <button onclick="closeLogs()">✖</button>
    </div>
  </div>

  <!-- ONLY THIS SCROLLS -->
  <div style="
    height: calc(100% - 50px);
    overflow-y: auto;
    margin-top: 10px;
  ">
    <pre id="logsContent" style="margin:0;"></pre>
  </div>

</div>

<script>

// (ALL YOUR EXISTING JS — UNCHANGED)

function toggleMode() {
  const mode = document.getElementById("mode").value;
  document.getElementById("imageFields").style.display =
    mode === "image" ? "block" : "none";
  document.getElementById("repoFields").style.display =
    mode === "repo" ? "block" : "none";
}

function getStatusClass(pods) {
  let running = pods.filter(p => p.status === "Running").length;
  if (running === pods.length) return "green";
  if (running > 0) return "yellow";
  return "red";
}

async function deleteService(name) {
  if (!confirm("Delete service?")) return;

  const res = await fetch(`/delete?name=${name}`);
  if (!res.ok) {
    const text = await res.text();
    alert("Delete failed: " + text);
  }

  loadServices();
}

function deletePod(pod) {
  if (!confirm("Delete pod?")) return;
  fetch(`/delete-pod?pod=${pod}`).then(loadServices);
}

function execPod(pod) {
  fetch(`/exec?pod=${pod}`);
}

let logReader = null;

function showLogs(pod) {
  const modal = document.getElementById("logsModal");
  const content = document.getElementById("logsContent");

  modal.style.display = "block";
  content.innerText = "Connecting...\n";

  fetch(`/logs?pod=${pod}`).then(response => {
    logReader = response.body.getReader();
    const decoder = new TextDecoder();

    function read() {
      logReader.read().then(({ done, value }) => {
        if (done) return;

        content.innerText += decoder.decode(value);
        content.scrollTop = content.scrollHeight;

        read();
      });
    }

    read();
  });
}

function closeLogs() {
  document.getElementById("logsModal").style.display = "none";
  document.getElementById("logsContent").innerText = "";

  if (logReader) {
    logReader.cancel();
    logReader = null;
  }
}
async function deployUnified() {
  const mode = document.getElementById("mode").value;
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const replicas = parseInt(document.getElementById("replicas").value);

  const envInput = document.getElementById("env").value;
  const env = {};

  if (envInput) {
    envInput.split(",").forEach(pair => {
      const [k, v] = pair.split("=");
      if (k && v) env[k.trim()] = v.trim();
    });
  }

  if (mode === "image") {
    let image = document.getElementById("image").value;
    if (!image.includes(":")) image += ":latest";

    await fetch("/provision", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, image, replicas, type, env })
    });

  } else {
    const repo = document.getElementById("repo").value;

    await fetch("/deploy-repo", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, repo, type })
    });
  }

  loadServices();
}

async function updateService(name) {
  const replicas = prompt("Replicas (1-5)");
  if (!replicas) return;

  await fetch("/service", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, replicas: parseInt(replicas) })
  });

  loadServices();
}

async function loadServices() {
  const res = await fetch("/services");
  const services = await res.json();

  let metrics = [];
  try {
    const m = await fetch("/metrics");
    metrics = await m.json();
  } catch {}

  const tbody = document.getElementById("tableBody");

  // keep existing rows (no full wipe)
  const existingRows = {};

  Array.from(tbody.children).forEach(row => {
    if (row.dataset && row.dataset.key) {
      existingRows[row.dataset.key] = row;
    }
  });

  services.sort((a, b) => a.name.localeCompare(b.name));

  let newRows = [];

  services.forEach(s => {
    s.pods.sort((a, b) => a.pod.localeCompare(b.pod));

    let totalCPU = 0;
    let totalMemory = 0;

    s.pods.forEach(p => {
      const m = metrics.find(x => x.pod === p.pod);
      if (m) {
        totalCPU += parseInt(m.cpu || "0");
        totalMemory += parseInt(m.memory || "0");
      }
    });

    const badgeClass = s.source === "repo" ? "repo" : "manual";

    const serviceKey = "svc-" + s.name;

    let serviceRow = existingRows[serviceKey];
    if (!serviceRow) {
      serviceRow = document.createElement("tr");
      serviceRow.dataset.key = serviceKey;
    }

    serviceRow.innerHTML = `
      <td>${s.name} <span class="badge ${badgeClass}">${s.source}</span></td>
      <td class="${getStatusClass(s.pods)}">${s.running}/${s.replicas}</td>
      <td>${s.replicas}</td>
      <td>${totalCPU}m</td>
      <td>${totalMemory}Mi</td>
      <td>
        <button onclick="window.open('http://${s.name}.127.0.0.1.nip.io')">Open</button>
        <button onclick="deleteService('${s.name}')">Delete</button>
        <button onclick="updateService('${s.name}')">Update</button>
      </td>
    `;

    newRows.push(serviceRow);

    // PODS
    s.pods.forEach(p => {
      const podKey = "pod-" + p.pod;

      let podRow = existingRows[podKey];
      if (!podRow) {
        podRow = document.createElement("tr");
        podRow.dataset.key = podKey;
      }

      const m = metrics.find(x => x.pod === p.pod) || {};

      podRow.innerHTML = `
        <td>↳ ${p.pod}</td>
        <td>${p.status}</td>
        <td>-</td>
        <td>${m.cpu || "-"}</td>
        <td>${m.memory || "-"}</td>
        <td>
          <button onclick="execPod('${p.pod}')">Exec</button>
          <button onclick="showLogs('${p.pod}')">Logs</button>
          <button onclick="deletePod('${p.pod}')">Delete Pod</button>
        </td>
      `;

      newRows.push(podRow);
    });
  });

  // replace DOM in one go (no flicker)
  tbody.replaceChildren(...newRows);
}

loadServices();
setInterval(loadServices, 5000);

</script>

</body>
</html>
