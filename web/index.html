<!DOCTYPE html>
<html>
<head>
  <title>IDP Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }

    .green { color: green; font-weight: bold; }
    .yellow { color: orange; font-weight: bold; }
    .red { color: red; font-weight: bold; }

    .loading { opacity: 0.5; pointer-events: none; }

    #statusBar { margin-top: 10px; font-weight: bold; }

    #logsModal {
      display: none;
      position: fixed;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 70%;
      background: black;
      color: lime;
      padding: 10px;
      overflow: auto;
      z-index: 1000;
    }

    #closeLogs {
      position: absolute;
      top: 5px;
      right: 10px;
      cursor: pointer;
      color: red;
      font-weight: bold;
    }

    .badge {
      padding: 2px 6px;
      margin-left: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: white;
    }

    .manual { background: #28a745; }
    .repo { background: #007bff; }
  </style>
</head>
<body>

<h2>IDP Dashboard</h2>

<!-- 🔥 MODE SELECTOR -->
<div id="controls">
  <select id="mode" onchange="toggleMode()">
    <option value="image">Image</option>
    <option value="repo">GitHub Repo</option>
  </select>

  <input id="name" placeholder="Service Name" />

  <!-- IMAGE INPUT -->
  <div id="imageFields">
    <input id="image" placeholder="Image (nginx:latest)" />
  </div>

  <!-- REPO INPUT -->
  <div id="repoFields" style="display:none;">
    <input id="repo" placeholder="GitHub Repo URL" />
  </div>

  <input id="replicas" type="number" value="1" min="1" max="5" />

  <select id="type">
    <option value="web">web</option>
    <option value="api">api</option>
    <option value="worker">worker</option>
  </select>

  <button onclick="deployUnified()">Deploy</button>
  <button onclick="loadServices()">Refresh</button>
</div>

<div id="statusBar"></div>

<table>
  <thead>
    <tr>
      <th>Service</th>
      <th>Status</th>
      <th>Replicas</th>
      <th>CPU</th>
      <th>Memory</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- LOGS -->
<div id="logsModal">
  <span id="closeLogs" onclick="closeLogs()">X</span>
  <pre id="logsContent"></pre>
</div>

<script>

function toggleMode() {
  const mode = document.getElementById("mode").value;

  document.getElementById("imageFields").style.display =
    mode === "image" ? "block" : "none";

  document.getElementById("repoFields").style.display =
    mode === "repo" ? "block" : "none";
}

function setLoading(state, msg="") {
  const controls = document.getElementById("controls");
  const status = document.getElementById("statusBar");

  if (state) {
    controls.classList.add("loading");
    status.innerText = msg;
  } else {
    controls.classList.remove("loading");
    status.innerText = "";
  }
}

function getStatusClass(running, total) {
  if (running === total) return "green";
  if (running > 0) return "yellow";
  return "red";
}

async function deployUnified() {
  const mode = document.getElementById("mode").value;
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const replicas = parseInt(document.getElementById("replicas").value);

  if (!name) {
    alert("Name required");
    return;
  }

  setLoading(true, "Deploying...");

  if (mode === "image") {
    let image = document.getElementById("image").value;

    if (!image.includes(":")) image += ":latest";

    await fetch("/provision", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, image, replicas, type })
    });

  } else {
    const repo = document.getElementById("repo").value;

    if (!repo) {
      alert("Repo URL required");
      setLoading(false);
      return;
    }

    await fetch("/deploy-repo", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, repo, type })
    });
  }

  setLoading(false);
  loadServices();
}

async function updateService(name) {
  const replicas = prompt("Enter new replicas (1-5):");
  if (!replicas) return;

  setLoading(true, "Updating...");

  await fetch("/service", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name,
      replicas: parseInt(replicas),
      type: "web"
    })
  });

  setLoading(false);
  loadServices();
}

async function deleteService(name) {
  setLoading(true, "Deleting...");
  await fetch(`/delete?name=${name}`);
  setLoading(false);
  loadServices();
}

async function loadServices() {
  const res = await fetch("/services");
  const raw = await res.json();
  const services = raw.value || raw;

  let metrics = [];
  try {
    const m = await fetch("/metrics");
    const mraw = await m.json();
    metrics = mraw.value || mraw;
  } catch {}

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  services.forEach(s => {

    let totalCPU = 0;
    let totalMemory = 0;

    s.pods.forEach(p => {
      const m = metrics.find(x => x.pod === p.pod);
      if (m) {
        totalCPU += parseInt(m.cpu || "0");
        totalMemory += parseInt(m.memory || "0");
      }
    });

    const badgeClass = s.source === "repo" ? "repo" : "manual";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>
        ${s.name}
        <span class="badge ${badgeClass}">
          ${s.source}
        </span>
      </td>
      <td class="${getStatusClass(s.running, s.replicas)}">
        ${s.running}/${s.replicas}
      </td>
      <td>${s.replicas}</td>
      <td>${totalCPU}m</td>
      <td>${totalMemory}Mi</td>
      <td>
        <button onclick="openService('${s.name}')">Open</button>
        <button onclick="deleteService('${s.name}')">Delete</button>
        <button onclick="updateService('${s.name}')">Update</button>
        <button onclick="togglePods('${s.name}')">Pods</button>
      </td>
    `;

    tbody.appendChild(tr);

    s.pods.forEach(p => {
      const podMetric = metrics.find(x => x.pod === p.pod) || {};

      const podRow = document.createElement("tr");
      podRow.style.display = "none";
      podRow.className = "pod-" + s.name;

      podRow.innerHTML = `
        <td colspan="2">↳ ${p.pod}</td>
        <td>${p.status}</td>
        <td>${podMetric.cpu || "-"}</td>
        <td>${podMetric.memory || "-"}</td>
        <td>
          <button onclick="execPod('${p.pod}')">Exec</button>
          <button onclick="showLogs('${p.pod}')">Logs</button>
        </td>
      `;

      tbody.appendChild(podRow);
    });
  });
}

function togglePods(name) {
  document.querySelectorAll(".pod-" + name).forEach(r => {
    r.style.display = r.style.display === "none" ? "table-row" : "none";
  });
}

async function openService(name) {
  const res = await fetch(`/open?name=${name}`);
  const url = await res.text();
  if (url) window.open(url, "_blank");
}

function execPod(pod) {
  fetch(`/exec?pod=${pod}`);
}

function showLogs(pod) {
  fetch(`/logs?pod=${pod}`)
    .then(r => r.text())
    .then(t => {
      document.getElementById("logsContent").innerText = t;
      document.getElementById("logsModal").style.display = "block";
    });
}

function closeLogs() {
  document.getElementById("logsModal").style.display = "none";
}

loadServices();
setInterval(loadServices, 5000);

</script>

</body>
</html>
