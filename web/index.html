<!DOCTYPE html>
<html>
<head>
  <title>IDP Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }

    .green { color: green; font-weight: bold; }
    .yellow { color: orange; font-weight: bold; }
    .red { color: red; font-weight: bold; }
    .blue { color: dodgerblue; font-weight: bold; }

    .badge {
      padding: 2px 6px;
      margin-left: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: white;
    }

    .manual { background: #28a745; }
    .repo { background: #007bff; }

    #logsModal {
      display: none;
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 85%;
      background: black;
      color: lime;
      z-index: 1000;
      border-radius: 8px;
      padding: 10px;
    }

    /* FIXED HISTORY MODAL */
    #historyModal {
      display: none;
      position: fixed;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 70%;
      background: white;
      z-index: 2000;
      padding: 15px;
      overflow: auto;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    #toast {
      display:none;
      position: fixed;
      top: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 10px 15px;
      border-radius: 6px;
      z-index: 3000;
    }
  </style>
</head>

<body>

<h2>IDP Dashboard</h2>

<div id="toast"></div>

<!-- CONTROLS (UNCHANGED) -->
<div id="controls">

  <select id="mode" onchange="toggleMode()">
    <option value="image">Image</option>
    <option value="repo">GitHub Repo</option>
  </select>

  <input id="name" placeholder="Service Name" />

  <div id="imageFields">
    <input id="image" placeholder="Image (nginx:latest)" />
  </div>

  <div id="repoFields" style="display:none;">
    <input id="repo" placeholder="GitHub Repo URL" />
  </div>

  <input id="env" placeholder="ENV (KEY=VALUE)" />
  <input id="replicas" type="number" value="1" min="1" max="5" />

  <select id="type">
    <option value="web">web</option>
    <option value="api">api</option>
    <option value="worker">worker</option>
  </select>

  <button onclick="deployUnified()">Deploy</button>
  <button onclick="loadServices()">Refresh</button>
</div>

<table>
  <thead>
    <tr>
      <th>Service</th>
      <th>Status</th>
      <th>Replicas</th>
      <th>CPU</th>
      <th>Memory</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- LOGS MODAL -->
<div id="logsModal">
  <div style="position: sticky; top:0; background:black; display:flex; justify-content:space-between;">
    <strong>Logs</strong>
    <div>
      <button onclick="closeLogs()">Stop</button>
      <button onclick="closeLogs()">✖</button>
    </div>
  </div>
  <div style="height:90%; overflow:auto;">
    <div id="timeline" style="margin-bottom:10px;"></div>
    <pre id="logsContent"></pre>
  </div>
</div>

<!-- FIXED HISTORY MODAL (OUTSIDE logsModal) -->
<div id="historyModal">
  <div style="display:flex; justify-content:space-between;">
    <h3>History</h3>
    <button onclick="closeHistory()">✖</button>
  </div>
  <pre id="historyContent"></pre>
</div>

<script>

/* ONLY IMPORTANT FUNCTIONS */

let deployingServices = {};

async function showHistory(name) {
  const res = await fetch(`/history?name=${name}`);
  const data = await res.json();

  historyModal.style.display = "block";

  let output = "";

  data.forEach(h => {
    output += `Revision: ${h.revision}\n`;
    output += `Status: ${h.status}\n`;
    output += `Updated: ${h.updated}\n`;
    output += `Description: ${h.description}\n`;
    output += "----------------------\n";
  });

  historyContent.innerText = output;
}

function closeHistory() {
  historyModal.style.display = "none";
  historyContent.innerText = "";
}

function showToast(msg, color="#333") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 2500);
}

function toggleMode() {
  const mode = document.getElementById("mode").value;
  imageFields.style.display = mode==="image"?"block":"none";
  repoFields.style.display = mode==="repo"?"block":"none";
}

function getHealth(s) {
  const statuses = s.pods.map(p => p.status);

  if (statuses.includes("Pending") || statuses.includes("ContainerCreating")) {
    return { text: "Deploying", cls: "blue" };
  }

  if (statuses.some(st =>
    st.includes("Error") ||
    st.includes("CrashLoopBackOff") ||
    st.includes("ImagePullBackOff")
  )) {
    return { text: "Failed", cls: "red" };
  }

  if (s.running === s.replicas) return { text: "Healthy", cls: "green" };
  if (s.running > 0) return { text: "Degraded", cls: "yellow" };

  return { text: "Deploying", cls: "blue" };
}

async function deployUnified() {

  const mode = modeEl.value;
  const name = nameEl.value;
  const type = typeEl.value;

  let env = {};
  const envInput = envEl.value;

  if (envInput) {
    envInput.split(",").forEach(p => {
      const [k, v] = p.split("=");
      if (k && v) env[k.trim()] = v.trim();
    });
  }

  // SAME STATE (no change)
  deployingServices[name] = {
    status: mode === "repo" ? "CLONING" : "DEPLOYING",
    logs: "",
    explain: {},
    deleting: false,
    failed: false
  };

  renderServices();

  // ================= REPO FLOW (UNCHANGED) =================
  if (mode === "repo") {

    const repo = repoEl.value;

    const res = await fetch("/deploy-repo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, repo, type, env })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) {
          if (!deployingServices[name].failed) {
            deployingServices[name].status = "READY";
          }
          renderServices();
          loadServices();
          return;
        }

        const chunk = decoder.decode(value);
        deployingServices[name].logs += chunk;

        if (chunk.includes("STEP:")) {
          const step = chunk.split("STEP:")[1].trim().split("\n")[0];

          if (step.includes("FAILED")) {
            deployingServices[name].status = "FAILED";
            deployingServices[name].failed = true;
          } else {
            deployingServices[name].status = step;
          }
        }

        renderServices();
        read();
      });
    }

    read();

  } else {

    // ================= ✅ IMAGE FLOW (FIXED) =================

    const image = imageEl.value;

    const res = await fetch("/provision", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        image,
        type,
        replicas: parseInt(replicasEl.value),
        env
      })
    });

    if (!res.ok) {
      const err = await res.text();
      deployingServices[name].status = "FAILED";
      deployingServices[name].logs = err;
      deployingServices[name].failed = true;
      renderServices();
      return;
    }

    // mark as deploying → real state will come from loadServices()
    deployingServices[name].status = "DEPLOYING";

    renderServices();

    // allow k8s to reflect
    setTimeout(loadServices, 2000);
  }
}

async function deleteService(name) {
  if (!confirm("Delete service?")) return;

  if (deployingServices[name]) {
    deployingServices[name].deleting = true;
    renderServices();
  }

  const res = await fetch(`/delete?name=${name}`);

  if (!res.ok) {
    showToast("Delete failed","red");
    return;
  }

  delete deployingServices[name];
  renderServices();
  loadServices();
}

function deletePod(pod) {
  fetch(`/delete-pod?pod=${pod}`).then(loadServices);
}

function execPod(pod) {
  fetch(`/exec?pod=${pod}`);
}

let logReader=null;

function showLogs(pod){
  logsModal.style.display="block";
  logsContent.innerText="Connecting...\n";

  fetch(`/logs?pod=${pod}`).then(res=>{
    logReader=res.body.getReader();
    const dec=new TextDecoder();

    function read(){
      logReader.read().then(({done,value})=>{
        if(done) return;
        logsContent.innerText+=dec.decode(value);
        logsContent.scrollTop=logsContent.scrollHeight;
        read();
      });
    }
    read();
  });
}

function updateTimeline(step) {
  const t = document.getElementById("timeline");

  const steps = ["CLONING","DETECTED","BUILDING","DEPLOYING","READY"];

  let html = "";

  steps.forEach(s => {
    let color = "#555";

    if (step.includes(s)) color = "dodgerblue";
    if (step === "READY" && s === "READY") color = "green";
    if (step.includes("FAILED")) color = "red";

    html += `<span style="margin-right:10px;color:${color}">
      ${s}
    </span>`;
  });

  t.innerHTML = html;
}

function closeLogs(){
  logsModal.style.display="none";
  logsContent.innerText="";
  if(logReader){logReader.cancel();logReader=null;}
}

async function updateService(name){
  const replicas=prompt("Replicas (1-5)");
  if(!replicas) return;

  await fetch("/service",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,replicas:parseInt(replicas)})
  });

  loadServices();
}

async function restartService(name) {
  if (!confirm("Restart service?")) return;

  showToast("Restarting...", "#555");

  const res = await fetch(`/restart?name=${name}`);

  if (res.ok) {
    showToast("🔄 Restarted", "blue");
  } else {
    showToast("❌ Failed", "red");
  }

  loadServices();
}

async function rollbackService(name) {
  if (!confirm("Rollback service to previous version?")) return;

  showToast("Rolling back...", "#555");

  const res = await fetch(`/rollback?name=${name}`);

  if (res.ok) {
    showToast("⏪ Rolled back", "blue");
  } else {
    showToast("❌ Failed", "red");
  }

  loadServices();
}

async function loadServices(){
  const services=await fetch("/services").then(r=>r.json());

  let metrics=[];
  try{metrics=await fetch("/metrics").then(r=>r.json());}catch{}

  const tbody=document.getElementById("tableBody");

  let rows=[];

  services.sort((a,b)=>a.name.localeCompare(b.name));

  services.forEach(s=>{
    s.pods.sort((a,b)=>a.pod.localeCompare(b.pod));

    const health=getHealth(s);

    let totalCPU=0,totalMemory=0;

    s.pods.forEach(p=>{
      const m=metrics.find(x=>x.pod===p.pod);
      if(m){
        totalCPU+=parseInt(m.cpu||0);
        totalMemory+=parseInt(m.memory||0);
      }
    });

    rows.push(`
      <tr>
        <td>${s.name} <span class="badge ${s.source}">${s.source}</span></td>
        <td class="${health.cls}">${health.text}</td>
        <td>${s.running}/${s.replicas}</td>
        <td>${totalCPU}m</td>
        <td>${totalMemory}Mi</td>
        <td>
          <button onclick="window.open('http://${s.name}.127.0.0.1.nip.io')">Open</button>
          <button onclick="deleteService('${s.name}')">Delete</button>
          <button onclick="restartService('${s.name}')">Restart</button>
          <button onclick="updateService('${s.name}')">Update</button>
          <button onclick="rollbackService('${s.name}')">Rollback</button>
          <button onclick="showHistory('${s.name}')">History</button>
        </td>
      </tr>
    `);

    s.pods.forEach(p=>{
      const m=metrics.find(x=>x.pod===p.pod)||{};
      rows.push(`
        <tr>
          <td>↳ ${p.pod}</td>
          <td>${p.status}</td>
          <td>-</td>
          <td>${m.cpu||"-"}</td>
          <td>${m.memory||"-"}</td>
          <td>
            <button onclick="execPod('${p.pod}')">Exec</button>
            <button onclick="showLogs('${p.pod}')">Logs</button>
            <button onclick="deletePod('${p.pod}')">Delete Pod</button>
          </td>
        </tr>
      `);
    });
  });

  tbody.innerHTML=rows.join("");
}

function renderTimeline(step) {
  const steps = ["CLONING","DETECTED","BUILDING","DEPLOYING","READY"];

  return steps.map(s => {
    let color = "#999";

    if (step.includes("FAILED")) color = "red";
    else if (step === s) color = "dodgerblue";
    else if (step === "READY" && s === "READY") color = "green";

    return `<span style="margin-right:10px;color:${color}">${s}</span>`;
  }).join("");
}

function getColor(status) {
  if (status.includes("FAILED")) return "red";
  if (status === "READY") return "green";
  return "blue";
}

function renderServices() {
  const tbody = document.getElementById("tableBody");

  let rows = "";

  // 🔥 DEPLOYING SERVICES FIRST (SEPARATED VISUALLY)
  Object.keys(deployingServices).forEach(name => {
    const s = deployingServices[name];

    rows += `
      <tr style="background:#f9f9f9;">
        <td>${name} <span class="badge repo">deploying</span></td>
        <td class="${getColor(s.status)}">
          ${s.deleting ? "Deleting..." : s.status}
        </td>
        <td>-</td>
        <td>-</td>
        <td>-</td>
        <td>
          ${!s.deleting ? `<button onclick="toggleLogs('${name}')">Logs</button>` : ""}
        </td>
      </tr>

      <tr>
        <td colspan="6">
          ${renderTimeline(s.status)}
          ${renderExplain(s.explain)}
          <pre style="max-height:120px;overflow:auto;background:#111;color:#0f0;padding:5px;">
${s.logs}
          </pre>
        </td>
      </tr>
    `;
  });

  // 🔥 THEN LOAD REAL SERVICES (NO OVERWRITE)
  fetch("/services")
    .then(r => r.json())
    .then(services => {

      let serviceRows = [];

      services.sort((a,b)=>a.name.localeCompare(b.name));

      services.forEach(s=>{
        s.pods.sort((a,b)=>a.pod.localeCompare(b.pod));

        const health=getHealth(s);

        serviceRows.push(`
          <tr>
            <td>${s.name} <span class="badge ${s.source}">${s.source}</span></td>
            <td class="${health.cls}">${health.text}</td>
            <td>${s.running}/${s.replicas}</td>
            <td>-</td>
            <td>-</td>
            <td>
              <button onclick="window.open('http://${s.name}.127.0.0.1.nip.io')">Open</button>
              <button onclick="deleteService('${s.name}')">Delete</button>
              <button onclick="restartService('${s.name}')">Restart</button>
              <button onclick="updateService('${s.name}')">Update</button>
              <button onclick="rollbackService('${s.name}')">Rollback</button>
              <button onclick="showHistory('${s.name}')">History</button>
            </td>
          </tr>
        `);

        s.pods.forEach(p=>{
          serviceRows.push(`
            <tr>
              <td>↳ ${p.pod}</td>
              <td>${p.status}</td>
              <td>-</td>
              <td>-</td>
              <td>-</td>
              <td>
                <button onclick="execPod('${p.pod}')">Exec</button>
                <button onclick="showLogs('${p.pod}')">Logs</button>
                <button onclick="deletePod('${p.pod}')">Delete Pod</button>
              </td>
            </tr>
          `);
        });

      });

      tbody.innerHTML = rows + serviceRows.join("");
    });
}

function renderExplain(explain) {
  if (!explain || Object.keys(explain).length === 0) return "";

  return `
    <div style="
      background:#f6f8fa;
      padding:8px;
      margin:5px 0;
      border-radius:6px;
      font-size:13px;
    ">
      <strong>Explain:</strong><br>
      ${Object.entries(explain).map(([k,v]) => 
        `<div><b>${k}:</b> ${v}</div>`
      ).join("")}
    </div>
  `;
}

const modeEl=document.getElementById("mode");
const nameEl=document.getElementById("name");
const imageEl=document.getElementById("image");
const repoEl=document.getElementById("repo");
const typeEl=document.getElementById("type");
const replicasEl=document.getElementById("replicas");
const envEl=document.getElementById("env");
const historyModal = document.getElementById("historyModal");
const historyContent = document.getElementById("historyContent");

loadServices();
setInterval(loadServices,5000);

</script>

</body>
</html>
