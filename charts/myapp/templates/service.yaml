{{- if ne .Values.type "worker" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: idp
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80
  type: {{ if eq .Values.type "web" }}NodePort{{ else }}ClusterIP{{ end }}
{{- end }}