apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: idp
  labels:
    app: {{ .Release.Name }}
    env: {{ .Values.env }}
    managed-by: idp
    source: {{ .Values.source }}
    repo: {{ default "none" .Values.repo }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  minReadySeconds: 5

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        env: {{ .Values.env }}
        managed-by: idp
        source: {{ .Values.source }}
        repo: {{ default "none" .Values.repo }}

    spec:
      containers:
        - name: {{ .Release.Name }}

          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: {{ .Values.service.port }}

          {{- if .Values.envVars }}
          env:
          {{- range $key, $value := .Values.envVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          {{- end }}

          {{- if .Values.secrets }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secret
          {{- end }}

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 2
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}